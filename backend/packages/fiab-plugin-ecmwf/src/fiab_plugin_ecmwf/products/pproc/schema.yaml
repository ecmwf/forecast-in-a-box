inputs:
  filter:stream:
    enfo:
      filter:type:
        "em/es/pb/efi/sot/ep":
          forecast:
            inputs:
              - request: &enfo_cf
                  stream: enfo
                  type: cf
              - request: &enfo_pf
                  stream: enfo
                  type: "pf"
                members: &enfo_members
                  start: 1
                  end: 50
        "cf/efic":
          forecast:
            inputs:
              request: *enfo_cf
        "pf":
          forecast:
            inputs:
              request: *enfo_pf
              members: *enfo_members
        fcmean/fcstdev/fcmin/fcmax:
          filter:members:
            only_zero:
              forecast:
                inputs:
                  request: *enfo_cf
            no_zero:
              forecast:
                inputs:
                  request: *enfo_pf
                  members: *enfo_members
            contains_zero:
              from_inputs: false
              forecast:
                inputs:
                  - request: *enfo_cf
                  - request: *enfo_pf
                    members: *enfo_members
      climatology:
        inputs:
          request:
            stream: "efhs"
            time: "0000"
        scheme: ecmwf-4days
    waef:
      filter:type:
        em/es/pb/efi/sot:
          forecast:
            inputs:
              - request: &waef_cf
                  stream: waef
                  type: "cf"
              - request: &waef_pf
