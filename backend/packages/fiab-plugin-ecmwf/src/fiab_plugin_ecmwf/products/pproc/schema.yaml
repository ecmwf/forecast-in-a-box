inputs:
  filter:class:
    ai:
      filter:stream:
        enfo:
          filter:type:
            "em/es/pb/efi/sot/ep":
              forecast:
                inputs:
                  - request: &enfo_cf
                      stream: enfo
                      type: cf
                  - request: &enfo_pf
                      stream: enfo
                      type: "pf"
                    members: &enfo_members
                      start: 1
                      end: 50
            "cf/efic":
              forecast:
                inputs:
                  request: *enfo_cf
            "pf":
              forecast:
                inputs:
                  request: *enfo_pf
                  members: *enfo_members
            fcmean/fcstdev/fcmin/fcmax:
              filter:members:
                only_zero:
                  forecast:
                    inputs:
                      request: *enfo_cf
                no_zero:
                  forecast:
                    inputs:
                      request: *enfo_pf
                      members: *enfo_members
                contains_zero:
                  from_inputs: false
                  forecast:
                    inputs:
                      - request: *enfo_cf
                      - request: *enfo_pf
                        members: *enfo_members
          climatology:
            inputs:
              request:
                stream: "efhs"
                time: "0000"
            scheme: ecmwf-4days
        waef:
          filter:type:
            em/es/pb/efi/sot:
              forecast:
                inputs:
                  - request: &waef_cf
                      stream: waef
                      type: "cf"
                  - request: &waef_pf
                      stream: waef
                      type: "pf"
                    members: *enfo_members
            "cf/efic":
              forecast:
                inputs:
                  request: *waef_cf
            "pf/ep":
              forecast:
                inputs:
                  request: *waef_pf
                  members: *enfo_members
            fcmean/fcstdev/fcmin/fcmax:
              filter:members:
                only_zero:
                  forecast:
                    inputs:
                      request:
                        <<: *waef_cf
                no_zero:
                  forecast:
                    inputs:
                      request: *waef_pf
                      members: *enfo_members
                contains_zero:
                  from_inputs: false
                  forecast:
                    inputs:
                      - request:
                          <<: *waef_cf
                      - request: *waef_pf
                        members: *enfo_members
          climatology:
            inputs:
              request:
                stream: "wehs"
                time: "0000"
            scheme: ecmwf-4days
    od:
      filter:stream:
        oper:
          filter:type:
            fc/fcmean/fcstdev/fcmin/fcmax:
              forecast:
                inputs:
                  request: &oper_fc
                    stream: oper
                    type: fc
        wave:
          filter:type:
            fc/fcmean/fcstdev/fcmin/fcmax:
              forecast:
                inputs:
                  request: &wave_fc
                    stream: wave
                    type: fc
        enfo:
          filter:type:
            "em/es/pb/efi/sot/ep":
              forecast:
                inputs:
                  - request: *oper_fc
                  - request: *enfo_pf
                    members: *enfo_members
            "cf/efic":
              forecast:
                inputs:
                  request: *oper_fc
            "pf":
              forecast:
                inputs:
                  request: *enfo_pf
                  members: *enfo_members
            fcmean/fcstdev/fcmin/fcmax:
              filter:members:
                only_zero:
                  forecast:
                    inputs:
                      request: *oper_fc
                no_zero:
                  forecast:
                    inputs:
                      request: *enfo_pf
                      members: *enfo_members
                contains_zero:
                  from_inputs: false
                  forecast:
                    inputs:
                      - request: *oper_fc
                      - request: *enfo_pf
                        members: *enfo_members
          climatology:
            inputs:
              request:
                stream: "efhs"
                time: "0000"
            scheme: ecmwf-4days
        waef:
          filter:type:
            em/es/pb/efi/sot:
              forecast:
                inputs:
                  - request: *wave_fc
                  - request: *waef_pf
                    members: *enfo_members
            "cf/efic":
              forecast:
                inputs:
                  request: *wave_fc
            "pf/ep":
              forecast:
                inputs:
                  request: *waef_pf
                  members: *enfo_members
            fcmean/fcstdev/fcmin/fcmax:
              filter:members:
                only_zero:
                  forecast:
                    inputs:
                      request: *wave_fc
                no_zero:
                  forecast:
                    inputs:
                      request: *waef_pf
                      members: *enfo_members
                contains_zero:
                  from_inputs: false
                  forecast:
                    inputs:
                      - request: *wave_fc
                      - request: *waef_pf
                        members: *enfo_members
          climatology:
            inputs:
              request:
                stream: "wehs"
                time: "0000"
            scheme: ecmwf-4days
  filter:type:
    fc/cf/pf:
      filter:param:
        "10":
          forecast:
            inputs:
              request:
                param: ["131", "132"]
        "121/122":
          forecast:
