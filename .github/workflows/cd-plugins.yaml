name: CD for plugins (core+ecmwf)

# Temporary action for releases of plugins and fiab core until we have something better in place

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Explicit tag. Use cX.Y.Z, make sure its free on pypi
        type: string
        required: true
      testpypi:
        description: Whether to upload to testpypi instead of pypi.
        type: boolean
        required: false
        default: false


jobs:
  buildupload:
    name: "Build and upload"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - uses: extractions/setup-just@v3
      - run: |
          set -euo pipefail
          if [ "${{ inputs.testpypi }}" = "true" ] ; then
            set -x
          fi
          TAG_PREF="c"
          TAG_FULL="${{ inputs.tag }}"
          case "$TAG_FULL" in
            c*) ;;
            *) echo "expected tag in the form cX.Y.Z" >&2; exit 1 ;;
          esac
          TAG="${TAG_FULL}.0"
          export SETUPTOOLS_SCM_PRETEND_VERSION=${TAG_FULL#$TAG_PREF}

          cd backend
          uv venv venv && source venv/bin/activate
          uv pip install twine build
          mkdir packagesDist
          for e in $(ls -d packages/*) ; do 
              pushd $e
              just build
              if [ -d dist ] ; then mv dist/* ../../packagesDist ; fi
              popd
          done
          rm -rf packagesDist/fiab_mcp_server* # lets not be releasing this one just yet
          twine check ./packagesDist/*

          # upload
          if [ "${{ inputs.testpypi }}" = "true" ] ; then
            export TWINE_PASSWORD="$TWINE_PASSWORD_TEST"
            TARGET="--repository testpypi"
          else
            export TWINE_PASSWORD="$TWINE_PASSWORD_PROD"
            TARGET=""
          fi
          twine upload --verbose $TARGET packagesDist/*

          git tag "$TAG"
          git push origin "$TAG"
        env:
          TWINE_PASSWORD_PROD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_PASSWORD_TEST: ${{ secrets.PYPI_TEST_API_TOKEN }}
