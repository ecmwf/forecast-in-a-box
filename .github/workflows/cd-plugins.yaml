name: CD for plugins (core+ecmwf)

# Temporary action for releases of plugins and fiab core until we have something better in place

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Explicit tag. Use cX.Y.Z, make sure its free on pypi
        type: string
        required: false
      testpypi:
        description: Whether to upload to testpypi instead of pypi.
        type: boolean
        required: false
        default: false


jobs:
  buildupload:
    name: "Build and upload"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - uses: astral-sh/setup-uv@v7
      - uses: extractions/setup-just@v3
      - run: |
          source .github/workflows/scripts.sh
          setupBash "${{ inputs.testpypi }}" 

          TAG_PREF="c"
          TAG=$(tagFromInputOrLatest "${{ inputs.tag }}" $TAG_PREF)
          TAG="${TAG}.0"

          preparePythonWheelVersion $TAG

          cd backend
          uv venv venv && source venv/bin/activate
          uv pip install twine build
          mkdir packagesDist
          for e in $(ls -d packages/*) ; do 
              pushd $e
              just build
              if [ -d dist ] ; then mv dist/* ../../packagesDist ; fi
              popd
          done
          rm -rf packagesDist/fiab_mcp_server* # lets not be releasing this one just yet

          uploadPypi "${{ inputs.test_pypi }}" 'packagesDist/*'
          gitTagAndPush $TAG

        env:
          TWINE_PASSWORD_PROD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_PASSWORD_TEST: ${{ secrets.PYPI_TEST_API_TOKEN }}
