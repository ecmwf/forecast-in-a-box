name: CD for the backend itself (including the bundled frontend)

# Releases the forecastbox backend package, which bundles the compiled frontend.
#
# It pushes a new tag vX.Y.Z, either provided on input, or derived from the
# git repo as the highest existing tag + 0.0.1. It builds the wheel (which
# triggers the frontend build), exports the dependency lockfile to
# install/pylock.toml, and tests the wheel against the lockfile. On success
# it uploads to PyPI, commits pylock.toml, and pushes the vX.Y.Z tag.
# The fiab-core version used for building and testing is cX.?.?, ie, the major
# version is matching, others don't matter.
# The fiab-core requirements constraints are >=X,<X+1.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Explicit tag, use to override the default patch-increment strategy
        type: string
        required: false
      testpypi:
        description: Whether to upload to testpypi instead of pypi.
        type: boolean
        required: false
        default: false

# TODO integrate with https://github.com/googleapis/release-please

jobs:
  # TODO add a prerequisite step `bigtest.yml` workflow, but make sure its reliable first
  deploy:
    name: "Build, upload and tag"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: extractions/setup-just@v3
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v4
      - run: |
          # NOTE dont use action checkout, doesnt coop with auth
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          git clone -b $BRANCH --single-branch https://$GH_USER:$GH_TOKEN@github.com/ecmwf/forecast-in-a-box.git .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://$GH_USER:$GH_TOKEN@github.com/ecmwf/forecast-in-a-box.git
          git fetch --tags origin # NOTE dont use with: fetch-tags: true, the clone is still shallow

          source scripts/cicd/scripts.sh
          setupBash "${{ inputs.testpypi }}" 
          REPO_ROOT=$(pwd)

          # derive the tag
          TAG_PREF="v"
          TAG=$(tagFromInputOrLatest "${{ inputs.tag }}" $TAG_PREF)
          preparePythonWheelVersion $TAG
          TAG_FIABCORE=$(extractFiabCoreTag "$TAG")
          TAG_FIABCORE_MAJ=$(majorFromVersion "$TAG_FIABCORE")

          # build
          source $REPO_ROOT/scripts/cicd/prepareBuildVenv.sh
          pushd backend && patchFiabCoreDep "$TAG_FIABCORE_MAJ" && popd
          just fiabwheel
          pushd backend
          uv export -o pylock.toml --no-emit-workspace --all-extras --no-dev > /dev/null
          mv pylock.toml ../install/pylock.toml
          source $REPO_ROOT/scripts/cicd/tearDownVenv.sh
          popd

          # test
          pushd backend
          source $REPO_ROOT/scripts/cicd/prepareValVenv.sh -r ../install/pylock.toml
          # NOTE cannot be merged with above, pylock must be alone
          uv pip install "fiab-core==${TAG_FIABCORE}" "fiab-plugin-test==${TAG_FIABCORE}" ./dist/*whl
          just test
          source $REPO_ROOT/scripts/cicd/tearDownVenv.sh
          popd

          # upload
          uploadPypi "${{ inputs.testpypi }}" 'backend/dist/*'

          # commit & tag
          git add install/pylock.toml
          git commit -m "Release $TAG" --allow-empty
          git push
          gitTagAndPush "${{ inputs.testpypi }}" $TAG

        env:
          TWINE_PASSWORD_PROD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_PASSWORD_TEST: ${{ secrets.PYPI_TEST_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_REPO_READ_TOKEN }} # says read but actually is write -- and we need that
          GH_USER: deploy
