name: CD for fiab-core and fiab-plugin-test

# Releases fiab-core (and fiab-plugin-test, as that one is effectively used to
# test core-backend interactions and its changes are coupled to core changes).
#
# It pushes a new tag cX.Y.Z.0, either provided on input, or derived from
# the git repo as the highest existing tag + 0.0.1.
# It builds and then tests the two wheels in isolation, each versioned X.Y.Z,
# then pushes to PyPI.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Explicit tag. Use cX.Y.Z, make sure its free on pypi
        type: string
        required: false
      testpypi:
        description: Whether to upload to testpypi instead of pypi.
        type: boolean
        required: false
        default: false


jobs:
  buildupload:
    name: "Build and upload"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: astral-sh/setup-uv@v7
      - uses: extractions/setup-just@v3
      - run: |
          # NOTE dont use action checkout, doesnt coop with auth
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          git clone -b $BRANCH --single-branch https://$GH_USER:$GH_TOKEN@github.com/ecmwf/forecast-in-a-box.git .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://$GH_USER:$GH_TOKEN@github.com/ecmwf/forecast-in-a-box.git
          git fetch --tags origin # NOTE dont use with: fetch-tags: true, the clone is still shallow

          source scripts/cicd/scripts.sh
          setupBash "${{ inputs.testpypi }}" 
          REPO_ROOT=$(pwd)

          TAG_PREF="c"
          TAG=$(tagFromInputOrLatest "${{ inputs.tag }}" $TAG_PREF)
          TAG_FIABCORE_MAJ=$(majorFromVersion "$TAG")
          TAG="${TAG}.0"

          preparePythonWheelVersion $TAG

          cd backend/packages
          mkdir packagesDist

          pushd fiab-core
          source $REPO_ROOT/scripts/cicd/prepareBuildVenv.sh
          just build
          source $REPO_ROOT/scripts/cicd/tearDownVenv.sh
          source $REPO_ROOT/scripts/cicd/prepareValVenv.sh dist/*whl
          just val
          source $REPO_ROOT/scripts/cicd/tearDownVenv.sh
          mv dist/* ../packagesDist
          popd

          pushd fiab-plugin-test
          patchFiabCoreDep "$TAG_FIABCORE_MAJ"
          git add pyproject.toml
          source $REPO_ROOT/scripts/cicd/prepareBuildVenv.sh
          just build
          source $REPO_ROOT/scripts/cicd/tearDownVenv.sh
          source $REPO_ROOT/scripts/cicd/prepareValVenv.sh ../packagesDist/fiab_core*whl dist/*whl
          just val
          source $REPO_ROOT/scripts/cicd/tearDownVenv.sh
          mv dist/* ../packagesDist
          popd

          uploadPypi "${{ inputs.testpypi }}" 'packagesDist/*'
          git commit -m "Core Release $TAG" --allow-empty # NOTE we allow empty because the FIABCORE_MAJ possibly didnt change
          git push
          gitTagAndPush "${{ inputs.testpypi }}" $TAG

        env:
          TWINE_PASSWORD_PROD: ${{ secrets.PYPI_API_TOKEN }}
          TWINE_PASSWORD_TEST: ${{ secrets.PYPI_TEST_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_REPO_READ_TOKEN }} # says read but actually is write -- and we need that
          GH_USER: deploy
